name: _tests

on:
  workflow_call:
    secrets:
      ROBLOSECURITY:
        required: false

jobs:
  tests:
    runs-on: windows-latest

    env:
      ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}

    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6
      - uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install Rokit tools
        run: rokit install --no-trust-check

      - name: Build Test place
        run: rojo build test.project.json -o TestPlace.rbxlx

      - name: Require ROBLOSECURITY for Studio tests
        if: ${{ env.ROBLOSECURITY == '' }}
        run: |
          Write-Error "ROBLOSECURITY not set; cannot run Studio/Jest tests in CI."
          exit 1

      - name: Install Roblox Studio (requires ROBLOSECURITY)
        if: ${{ env.ROBLOSECURITY != '' }}
        uses: OrbitalOwen/roblox-win-installer-action@1.1
        with:
          cookie: ${{ secrets.ROBLOSECURITY }}
          token: ${{ github.token }}

      - name: Run Jest Lua via run-in-roblox
        if: ${{ env.ROBLOSECURITY != '' }}
        run: |
          run-in-roblox --place TestPlace.rbxlx --script tests\run-tests.luau
